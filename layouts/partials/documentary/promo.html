{{ with site.GetPage "/staatkundige-portretten" }}
	<div class="grid content-center bg-popup-bg max-md:[box-shadow:40px_0_var(--popup-background-color)] max-md:grid-rows-[auto_auto] max-md:-ml-5 max-md:pl-5 max-md:w-[calc(100vw-40px)] md:grid-cols-[8fr_5fr] md:h-[300px] md:pl-10" data-pagefind-ignore="all">
		<div class="grid content-center max-md:row-[2] max-md:p-5 max-md:pt-0 md:mt-[25px]">
			<div class="w-fit max-md:mx-auto max-md:mt-5">
				<h3 class="text-accent italic !font-normal !mb-0 -mt-[30px] max-md:text-[5vw] max-md:text-right md:text-[32px] md:text-right">Staatkundige</h3>
				<h2 class="text-accent font-sc leading-[40px] mb-10 pb-[13px] border-b border-dashed border-popup-border w-fit max-md:text-[13vw] max-md:-mt-[1vw] md:text-[57px]">Portretten</h2>
			</div>

			<p class="!text-[19px] !m-0 max-w-[80%] max-md:mx-auto max-md:mt-[30px] max-md:text-center">In de eerste aflevering van <a href="{{ .RelPermalink }}" class="italic">Staatkundige Portretten</a> belicht Reactionair het CDA.</p>
		</div>

		<a href="{{ .RelPermalink }}" class="[perspective:900px] max-md:mx-auto max-md:my-[10px] max-md:w-[230px] max-md:scale-[1.75] md:w-[300px] md:-ml-5 md:-mt-[60px] md:scale-[2] md:self-center">
			{{ with resources.Get "images/documentary/camera.webp" }}
				<div class="relative [transform-style:preserve-3d] [transition:transform_1.5s_ease] [transform:rotateY(-20deg)_rotateX(3deg)] [animation:17s_ease_0s_infinite_animate]">
					<img
						src="{{ (.Fit "900x900 webp").RelPermalink }}"
						alt="Filmcamera"
						loading="lazy"
						class="block h-auto w-full [filter:drop-shadow(8px_16px_18px_var(--dark-shadow-color))]"
					>
				</div>
			{{ end }}
		</a>
	</div>
{{ end }}
