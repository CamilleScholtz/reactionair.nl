<div class="grid items-center justify-center gap-[30px]">
	{{ partial "authors/image" (dict "author" .author "class" "mx-auto") }}


	<div class="grid content-center text-center">
		<h1>{{ .author.Title | safeHTML }}</h1>
		<h2 class="italic">{{ .author.Params.keyword }}</h2>

		<p class="mt-[30px] text-left">{{ .author.Params.description }}</p>
	</div>
</div>
