<div class="p-5 pb-0">
	<div class="text-accent italic">{{ delimit .article.Params.authors ", " " & " }}</div>
	<h2 class="text-text mt-[5px] max-md:[-webkit-line-clamp:2] max-md:[-webkit-box-orient:vertical] max-md:overflow-hidden max-md:text-[26px] max-md:leading-9 max-md:[display:-webkit-box] md:text-[27px] md:leading-[33px]">{{ .article.Title | safeHTML }}</h2>
</div>

{{ with .article.Resources.GetMatch "image.*" }}
	<figure class="grid overflow-hidden w-full">
		{{ $anchor := "Smart" }}
		{{ if isset .Params "anchor" }}
			{{ $anchor = .Params.anchor }}
		{{ end }}

		{{ $1x := .Fill (printf "310x180 webp %s" $anchor) }}
		{{ $2x := .Fill (printf "620x359 webp %s" $anchor) }}

		{{ partial "components/article-image" (dict
			"copyrightFree" $.article.Params.copyrightFree
			"image1x"       $1x
			"image2x"       $2x
			"alt"           ($.article.Title | safeHTML)
			"class"         "w-full max-md:h-[200px] md:h-full object-cover"
			"lazy"          $.lazy
		) }}
	</figure>
{{ end }}
