<div
	class="bg-accent-bg mb-2.5 p-10"
	itemprop="comment"
	itemscope
	itemtype="https://schema.org/Comment"
	{{ if .stub }}
		x-cloak
		x-show="commented"
		x-ref="form"
	{{ end }}
>
	<div>
		<h3
			class="text-accent inline text-sm font-normal mt-0"
			itemprop="author"
			itemscope
			itemtype="https://schema.org/Person"
		>
			<span
				itemprop="name"
				{{ if .stub }}
					x-text="!commented || form.author"
				{{ end }}
			>
				{{ index .context "author" }}
			</span>
		</h3>

		{{ if .review }}
			<span
				class="text-muted text-sm italic [&>span]:text-text"
				itemprop="ratingValue"
				content="{{ index .context "rating" }}"
				min="1"
				value="{{ index .context "rating" }}"
				max="5"
				{{ if .stub }}
					x-html="!commented || `&nbsp;geeft dit product een beoordeling van <span>${form.rating} / 5</span>`"
				{{ end }}
			>
				&nbsp;geeft dit product een beoordeling van <span>{{ index .context "rating" }} / 5</span>
			</span>
		{{ end }}

		<p class="text-muted inline text-sm lowercase md:leading-[29px]">
			<time
				datetime="{{ index .context "date" }}"
				itemprop="datePublished"
				{{ if .stub }}
					x-html="!commented || `<span class='pipe'>—</span>${new Date().toLocaleDateString('nl-NL', { year: 'numeric', month: 'long', day: 'numeric' })}`"
				{{ end }}
			>
				<span class="pipe">—</span>{{ time.Format "2 January, 2006" (index .context "date") | title }}
			</time>
		</p>
	</div>

	<div
		class="text-[19px] mb-4 mt-5 text-justify text-pretty [&>p]:mb-[30px] [&>p]:text-justify [&>p]:text-pretty [&>p:last-of-type]:mb-0 [&_a]:hyphens-auto [&_a]:break-words"
		itemprop="text"
		{{ if .stub }}
			x-text="!commented || form.body"
		{{ end }}
	>
		{{ index .context "body" | markdownify }}
	</div>
</div>
