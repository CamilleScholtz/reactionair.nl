{{ define "main" }}
	<article>
		<section
			class="mx-auto pt-[30px] relative md:max-w-[var(--avg-width)]"
			x-data="{
				pagefind: null,
				input:    '',
				matches:  [],

				async init() {
					this.pagefind = await import('/pagefind/pagefind.js');
					await this.pagefind.init();
				},

				async search() {
					if (!this.pagefind) {
						return;
					}

					if (!this.input) {
						return this.matches = [];
					}

					const search = await this.pagefind.search(this.input);
					this.matches = await Promise.all(search.results.slice(0, 10).map(r => r.data()));
				}
			}"
		>
			<div class="grid grid-cols-[auto_50px]">
				<input
					class="!w-full !float-none !mb-0"
					type="search"
					placeholder="Zoeken…"
					autocomplete="off"
					spellcheck="false"
					x-model="input"
					@input.debounce.100ms="search"
				>

				{{ partial "components/button" (dict
					"tag"     "button"
					"variant" "square"
					"text"    (printf `<img src="%s" alt="Zoeken" style="width: 28px; height: 28px;">` ("img/search.svg" | relURL))
				) }}
			</div>

			<div class="mt-10">
				<template x-for="match in matches">
					<a class="block border-b border-dashed border-border p-5 last:border-b-0" :href="match.url">
						<p class="italic !text-[16px]" x-html="match.meta.authors"></p>
						<h2 class="!text-lg hyphens-auto !leading-[25px] mt-[5px] break-words" x-html="`<span class='font-semibold inline'>${match.meta.theme}<span class='font-normal ml-[5px] mr-2.5'>/</span></span>${match.meta.title}`">
						</h2>
					</a>
				</template>
			</div>
		</section>
	</article>
{{ end }}
