<section class="blockquote border-b border-t border-dashed border-border mb-[25px] pt-[30px] text-center">
	<p class="text-[28px] italic leading-[40px] text-wrap-balance">&ldquo;{{ .Get "text" | safeHTML }}&rdquo;</p>
	{{ if .Get "author" }}
		<p class="-mt-[15px] text-[18px] leading-[25px] text-muted"><span class="text-accent">&mdash;</span> {{ .Get "author" | safeHTML }}</p>
	{{ end }}
</section>
